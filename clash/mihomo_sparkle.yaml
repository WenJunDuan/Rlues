      name: 香港自动,
      <<: *BaseUT,
      include-all: true,
      filter: *FilterHK,
      hidden: true,
    }
  - {
      name: 台湾自动,
      <<: *BaseUT,
      include-all: true,
      filter: *FilterTW,
      hidden: true,
    }
  - {
      name: 狮城自动,
      <<: *BaseUT,
      include-all: true,
      filter: *FilterSG,
      hidden: true,
    }
  - {
      name: 日本自动,
      <<: *BaseUT,
      include-all: true,
      filter: *FilterJP,
