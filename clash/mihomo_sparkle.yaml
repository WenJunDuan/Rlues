  - DOMAIN-SUFFIX,windsurf.com,🤖 人工智能
  - DOMAIN-SUFFIX,codeium.com,🤖 人工智能
  - DOMAIN-SUFFIX,v0.dev,🤖 人工智能
  - DOMAIN-SUFFIX,bolt.new,🤖 人工智能
  - DOMAIN-SUFFIX,lovable.dev,🤖 人工智能
  - DOMAIN-SUFFIX,notebooklm.google.com,🔍 谷歌服务
  - RULE-SET,OpenAi,🤖 人工智能
  - RULE-SET,Copilot,🤖 人工智能
