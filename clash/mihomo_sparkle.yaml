      <<: *SelectDC,
      icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Alpha/Bitcloud.png",
    }

  - {
      name: speedtest,
      type: select,
      url: "http://www.gstatic.com/generate_204",
      proxies:
        [
          DIRECT,
          香港策略,
          狮城策略,
          日本策略,
          美国策略,
