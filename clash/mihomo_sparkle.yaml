  - RULE-SET,china_ip,DIRECT

  # ==================== 14. 兜底规则 ====================
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,CN,🏠 国内流量,no-resolve
  - MATCH,🐟 兜底分流
