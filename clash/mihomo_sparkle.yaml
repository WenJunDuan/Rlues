      [DIRECT, 🎯 节点选择, 故障转移, 香港策略, 狮城策略, 日本策略, 美国策略],
  }
SelectUS:
  &SelectUS {
    type: select,
    proxies:
      [
        美国策略,
        🎯 节点选择,
        故障转移,
        狮城策略,
        日本策略,
        香港策略,
        台湾策略,
        欧盟策略,
        DIRECT,
      ],
  }
SelectSG:
  &SelectSG {
    type: select,
    proxies:
      [
        狮城策略,
        🎯 节点选择,
        故障转移,
        香港策略,
        日本策略,
        美国策略,
        台湾策略,
        欧盟策略,
        DIRECT,
      ],
  }
SelectSM:
  &SelectSM {
    type: select,
    proxies:
      [
        社交自动,
        美国策略,
        日本策略,
        狮城策略,
        欧盟策略,
        冷门节点,
        全部节点,
        🎯 节点选择,
        DIRECT,
      ],
  }

# 规则集模板
# 远程规则集更新走策略组, 减少 GitHub/SKK 直连失败
RulesetDomain:
  &RulesetDomain {
    type: http,
    behavior: domain,
    format: mrs,
    interval: 86400,
    proxy: 🎯 节点选择,
  }
RulesetIP:
  &RulesetIP {
    type: http,
    behavior: ipcidr,
    format: mrs,
    interval: 86400,
    proxy: 🎯 节点选择,
  }
RulesetClassical:
  &RulesetClassical {
    type: http,
    behavior: classical,
    format: text,
    interval: 86400,
    proxy: 🎯 节点选择,
  }
RulesetYaml:
  &RulesetYaml {
    type: http,
    behavior: classical,
    format: yaml,
    interval: 86400,
    proxy: 🎯 节点选择,
  }

# ⚙️ ============================= 核心配置 =============================
port: 7893
socks-port: 7891
redir-port: 7892
mixed-port: 7890
tproxy-port: 7894
allow-lan: true
mode: rule
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: "off"

keep-alive-interval: 30
keep-alive-idle: 600

skip-auth-prefixes:
  - 127.0.0.1/8
  - 192.168.0.0/16
  - 10.0.0.0/8
  - 100.64.0.0/10

# 🔒 锁本地! 远程面板请绑 Tailscale IP, 切勿改回 0.0.0.0 (allow-lan 下 = 全 LAN 可控)
external-controller: 0.0.0.0:9090
secret: "SdlYQeCNR1K+LsdElOKjSjP4LKm6yVf3nbrhsfdvbsadvaergw"
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

profile:
  store-selected: true
  store-fake-ip: true

# GEO 数据配置
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# 👃 ============================= 域名嗅探 =============================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  skip-dst-address:
    - 100.64.0.0/10
  sniff:
    HTTP:
      ports: [80, 8080, 8443, 8888]
      override-destination: true
    TLS:
      ports: [443, 8443]
      override-destination: false
    QUIC:
      ports: [443, 8443]
      override-destination: false
  force-domain:
    - "+.v2ex.com"
    - "+.netflix.com"
    - "+.nflxvideo.net"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 🧱 ============================= TUN 配置 =============================
tun:
  enable: true
  stack: mixed
  device: Mihomo
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 1500
  gso: true
  gso-max-size: 65536
  udp-timeout: 300
  route-exclude-address:
    - 100.64.0.0/10
  # 仅排除 Tailscale 相关接口
  exclude-interface:
    - tailscale0
    - "Tailscale*"
    - utun0

# 🌐 ============================= DNS 配置 =============================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  prefer-h3: false
  use-hosts: true
  use-system-hosts: true
  cache-algorithm: arc

  fake-ip-filter:
    - "*.lan"
    - "localhost.ptlogin2.qq.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.xboxlive.com"
    - "msftconnecttest.com"
    - "xbox.*.microsoft.com"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    - "*.ts.net"
    - "tailscale.com"
    - "+.local"
    - "+.home.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "ntp.*.com"
    - "+.pool.ntp.org"
    - "time.nist.gov"
    - "+.stun.l.google.com"
    - "stun.stunprotocol.org"
    - "+.stun.cloudflare.com"
    - "+.stun.syncthing.net"
    - "+.stun.playstation.net"
    - "+.stun.xboxlive.com"

  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - "https://1.1.1.1/dns-query#🎯 节点选择"
    - "https://8.8.8.8/dns-query#🎯 节点选择"
    - "https://9.9.9.9/dns-query#🎯 节点选择"

  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true

  nameserver-policy:
    "*.ts.net,tailscale.com": system
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:google,youtube,telegram,twitter":
      - "https://8.8.8.8/dns-query#🎯 节点选择"
      - "https://1.1.1.1/dns-query#🎯 节点选择"

# 📡 ============================= 代理提供者 =============================
proxy-providers:
  Airport:
    type: http
    url: "http://192.168.31.2:3331/1234QWer/download/collection/multAirport?target=ClashMeta"
    path: ./proxy_providers/airport.yaml
    interval: 3600
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      additional-prefix: "AirPort"

