# **=============================== 规则提供者 ===============================**
rule-providers:
  reject_non_ip:
    {
      <<: *RulesetClassical,
      url: "https://ruleset.skk.moe/Clash/non_ip/reject.txt",
      path: ./ruleset/reject_non_ip.txt,
    }
  reject_domainset:
    {
      type: http,
      behavior: domain,
      format: text,
      interval: 86400,
      url: "https://ruleset.skk.moe/Clash/domainset/reject.txt",
      path: ./ruleset/reject_domainset.txt,
    }
  reject_non_ip_drop:
