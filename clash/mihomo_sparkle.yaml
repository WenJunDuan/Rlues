# ==========================================
# 🚀 Mihomo 终极配置 · v4.4
# 🧭 基于 v4.3 + 官方文档逐项核对 (wiki.metacubex.one)
# 📅 2026-05-28
# ==========================================
#
# 📌 v4.4 变更摘要
#
# 🔒 [安全]
#    🔁 external-controller: 0.0.0.0 → 127.0.0.1 (v4.3 又被回退, 本版加防呆注释锁死)
#
# ⚡ [性能]
#    🧠 geodata-loader → standard (本机非低内存设备, 整库入内存匹配更快)
#    🌐 规则集 GitHub 源统一换 jsdelivr CDN (CN 直连可达, 规避冷启动竞态)
#
# 🧹 [清理 no-op] 删除以下"伪优化" (仅复述官方默认值, 不改变任何行为):
#    🟡 global-ua          默认即 clash.meta
#    🟡 etag-support       默认启用
#    🟡 experimental.quic  默认即 false
#    🟡 max-failed-times   默认即 5
#
# ✅ [保留的真优化] (确实改变行为):
#    ⏱️ 策略组 timeout + expected-status:204 (与 generate_204 校验对齐)
#    🧩 direct-nameserver-follow-policy: true (DIRECT 解析也遵守 nameserver-policy)
#    🛰️ rule-providers proxy: 🎯 节点选择 (GitHub 类源走代理下载)
#    🚫 海外 QUIC 拦截 (UDP/443 且 NOT CN → REJECT, 强制 TCP 回退)
#    🩹 prefer-h3: false (与 QUIC 拦截自洽)
#
# ==========================================
# 🏗️ 设计原则
#
#    1️⃣ DIRECT vs 🏠 国内流量
#         DIRECT      = 基础设施 / CDN / 确定性直连 (不可被误切)
#         🏠 国内流量 = 仅 GEOIP,CN 兜底 (保留手动切换)
#    2️⃣ 🌐 DNS: respect-rules + direct-nameserver, 全 IP 形式 DoH, 无 fallback
#    3️⃣ 🎛️ 策略组: 节点选择(select) → 故障转移(fallback) → 地区策略(select) → 地区自动(url-test)
# ==========================================

# ⚓ ==================== 锚点配置 ====================
BaseFB:
  &BaseFB {
    type: fallback,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    timeout: 5000,
    expected-status: 204,
  }
BaseCH:
  &BaseCH {
    type: load-balance,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    strategy: consistent-hashing,
    timeout: 5000,
    expected-status: 204,
  }
BaseCR:
  &BaseCR {
    type: load-balance,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    strategy: round-robin,
    timeout: 5000,
    expected-status: 204,
  }
BaseUT:
  &BaseUT {
    type: url-test,
    interval: 300,
    tolerance: 50,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    timeout: 5000,
    expected-status: 204,
  }

# 节点筛选正则
FilterHK: &FilterHK "^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(游戏|GAME|5x)).*$"
FilterSG: &FilterSG "^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(游戏|GAME|5x)).*$"
FilterJP: &FilterJP "^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(游戏|GAME|5x)).*$"
FilterUS: &FilterUS "^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(游戏|GAME|5x)).*$"
FilterTW: &FilterTW "^(?=.*(?i)(台|臺|🇹🇼|TW|Taiwan|Taipei|Taichung|Tainan|Kaohsiung|TPE|TSA|KHH|RMQ|TNN|新竹|桃园|桃園|彰化|高雄|台北|台中|台南|Hsinchu|Taoyuan))(?!.*(游戏|GAME|5x)).*$"
FilterEU: &FilterEU "^(?=.*(?i)(英|法|德|荷|意|西|瑞|芬|丹|挪|波|🇬🇧|🇫🇷|🇩🇪|🇳🇱|🇮🇹|🇪🇸|🇨🇭|CDG|FRA|AMS|LHR|MUC))(?!.*(游戏|GAME|5x)).*$"
FilterOT: &FilterOT "^(?!.*(DIRECT|直连|美|港|坡|台|臺|新|日|英|法|德|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇬🇧|HK|TW|SG|JP|US|GB|Taiwan|Taipei))"
FilterAL: &FilterAL "^(?!.*(DIRECT|直连|群|邀请|返利|循环|官网|客服|网站|过期|到期|流量|USE|USED|TOTAL|EXPIRE))"

