# **=============================== 分流规则 ===============================**
# [PERF] 规则重排原则:
#   - 高频命中的规则靠前（LAN、直连、Tailscale）
#   - IP 规则尽量带 no-resolve 避免触发额外 DNS 查询
#   - 同类规则聚合，减少规则引擎跳转开销
rules:
  # ==================== 0. 进程直连 (最高优先级，零开销短路) ====================
  - PROCESS-NAME,tailscale.exe,DIRECT
  - PROCESS-NAME,tailscaled.exe,DIRECT
  - PROCESS-NAME,tailscaled,DIRECT

  # ==================== 1. 网络基础设施直连 (高频命中) ====================
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - IP-CIDR,192.168.31.0/24,DIRECT,no-resolve
  - DOMAIN-SUFFIX,ts.net,DIRECT
  - DOMAIN-KEYWORD,tailscale,DIRECT
  - RULE-SET,lan_non_ip,DIRECT
  - RULE-SET,lan_ip,DIRECT

  # ==================== 2. DNS 服务器走代理 (防超时) ====================
  - IP-CIDR,8.8.8.8/32,🎯 节点选择,no-resolve
  - IP-CIDR,8.8.4.4/32,🎯 节点选择,no-resolve
  - IP-CIDR,1.1.1.1/32,🎯 节点选择,no-resolve
  - IP-CIDR,1.0.0.1/32,🎯 节点选择,no-resolve

  # ==================== 3. 用户自定义直连 ====================
  - DOMAIN-SUFFIX,guoker.org,DIRECT
  - DOMAIN-SUFFIX,gying.net,DIRECT
  - DOMAIN-SUFFIX,selectgroup.click,DIRECT
  - DOMAIN-SUFFIX,smardaten.com,DIRECT
  - DOMAIN-SUFFIX,right.codes,DIRECT
  - DOMAIN-SUFFIX,juejin.cn,DIRECT
  - DOMAIN-SUFFIX,acemcp.heroman.wtf,DIRECT

  # ==================== 4. 用户自定义代理 ====================
  - DOMAIN-SUFFIX,coze.com,🌍 全球加速
  - DOMAIN-SUFFIX,ouonetwork.com,🌍 全球加速
  - DOMAIN-SUFFIX,linux.do,🌍 全球加速
  - DOMAIN-SUFFIX,marketplace.jetbrains.com,🌍 全球加速

  # ==================== 5. 广告拦截 ====================
  - RULE-SET,reject_non_ip,REJECT
  - RULE-SET,reject_domainset,REJECT
  - RULE-SET,reject_non_ip_drop,REJECT-DROP
  - RULE-SET,reject_non_ip_no_drop,REJECT
  - RULE-SET,reject_ip,REJECT

  # ==================== 6. AI 服务 ====================
