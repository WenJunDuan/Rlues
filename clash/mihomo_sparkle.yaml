# ==========================================
# Mihomo 终极配置 - 优化版
# 基于: 原配置 + Tailscale 兼容修复 + 性能优化
# Date: 2026-02-11
# ==========================================
#
# ====== 本次优化变更摘要 ======
#
# [CRITICAL] 修复项:
#   1. 删除 global-client-fingerprint (已废弃，日志反复警告)
#   2. fallback DNS 加 #策略组 后缀 (消除 8.8.8.8/1.1.1.1 超时风暴) -- 已在上轮修复
#   3. TUN 加 inet4-route-exclude-address (Tailscale CGNAT 绕过) -- 已在上轮修复
#   4. sniffer 加 skip-dst-address (Tailscale 流量不嗅探) -- 已在上轮修复
#
# [PERF] 性能优化:
#   5. 规则重排: LAN/私有IP规则前置，减少每个本地连接的规则遍历开销
#   6. 新增 DNS 服务器 IP 显式代理规则，避免落入兜底分流超时
#   7. 删除未使用的 YAML 锚点 (RulesetDomain, RulesetIP)，减少解析开销
#   8. skip-auth-prefixes 加入 Tailscale CGNAT 段
#
# [ENHANCE] 功能增强:
#   9. AI 服务域名补全 (DeepSeek, Windsurf, v0.dev 等 2025-2026 新服务)
#  10. fallback DNS 恢复 TLS 协议备份，提升协议多样性
#  11. fake-ip-filter 补全 STUN/NTP 模式
#
# [CLEANUP] 清理:
#  12. 删除 geodata-loader: memconservative (被 nikki 覆盖为 standard，写了也没用)
#  13. 注释说明 nikki 插件与手动配置的优先级关系
#
# ==========================================

# ==================== 锚点配置 ====================
BaseFB:
  &BaseFB {
    type: fallback,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
  }
BaseCH:
  &BaseCH {
    type: load-balance,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    strategy: consistent-hashing,
  }
BaseCR:
  &BaseCR {
    type: load-balance,
    interval: 300,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    strategy: round-robin,
  }
BaseUT:
  &BaseUT {
    type: url-test,
    interval: 300,
    tolerance: 50,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
  }

# 节点筛选正则
FilterHK: &FilterHK "^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(游戏|GAME|5x)).*$"
FilterSG: &FilterSG "^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(游戏|GAME|5x)).*$"
FilterJP: &FilterJP "^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(游戏|GAME|5x)).*$"
FilterUS: &FilterUS "^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(游戏|GAME|5x)).*$"
FilterTW: &FilterTW "^(?=.*(?i)(台|臺|🇹🇼|TW|Taiwan|Taipei|Taichung|Tainan|Kaohsiung|TPE|TSA|KHH|RMQ|TNN|新竹|桃园|桃園|彰化|高雄|台北|台中|台南|Hsinchu|Taoyuan))(?!.*(游戏|GAME|5x)).*$"
FilterEU: &FilterEU "^(?=.*(?i)(英|法|德|荷|意|西|瑞|芬|丹|挪|波|🇬🇧|🇫🇷|🇩🇪|🇳🇱|🇮🇹|🇪🇸|🇨🇭|CDG|FRA|AMS|LHR|MUC))(?!.*(游戏|GAME|5x)).*$"
FilterOT: &FilterOT "^(?!.*(DIRECT|直连|美|港|坡|台|臺|新|日|英|法|德|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇺🇸|🇬🇧|HK|TW|SG|JP|US|GB|Taiwan|Taipei))"
FilterAL: &FilterAL "^(?!.*(DIRECT|直连|群|邀请|返利|循环|官网|客服|网站|过期|到期|流量|USE|USED|TOTAL|EXPIRE))"

# 策略组代理列表模板
SelectFB:
  &SelectFB {
    type: select,
    proxies:
      [
        故障转移,
        香港策略,
        狮城策略,
        日本策略,
        美国策略,
        台湾策略,
        欧盟策略,
        冷门节点,
        全部节点,
        DIRECT,
      ],
  }
SelectPY:
  &SelectPY {
    type: select,
    proxies:
      [
        🎯 节点选择,
        故障转移,
        香港策略,
        狮城策略,
        日本策略,
        美国策略,
        台湾策略,
        欧盟策略,
        冷门节点,
        全部节点,
        DIRECT,
      ],
  }
SelectDC:
  &SelectDC {
    type: select,
    proxies:
      [DIRECT, 🎯 节点选择, 故障转移, 香港策略, 狮城策略, 日本策略, 美国策略],
  }
SelectUS:
  &SelectUS {
    type: select,
    proxies:
      [
        美国策略,
        🎯 节点选择,
        故障转移,
        狮城策略,
        日本策略,
        香港策略,
        台湾策略,
        欧盟策略,
        DIRECT,
      ],
  }
SelectSG:
  &SelectSG {
    type: select,
    proxies:
      [
        狮城策略,
        🎯 节点选择,
        故障转移,
        香港策略,
        日本策略,
        美国策略,
        台湾策略,
        欧盟策略,
        DIRECT,
      ],
  }

# 规则集模板
RulesetDomain:
  &RulesetDomain { type: http, behavior: domain, format: mrs, interval: 86400 }
RulesetIP:
  &RulesetIP { type: http, behavior: ipcidr, format: mrs, interval: 86400 }
RulesetClassical:
  &RulesetClassical {
    type: http,
    behavior: classical,
    format: text,
    interval: 86400,
  }
RulesetYaml:
  &RulesetYaml {
    type: http,
    behavior: classical,
    format: yaml,
    interval: 86400,
  }

# **=============================== 核心配置 ===============================**
port: 7893
socks-port: 7891
redir-port: 7892
mixed-port: 7890
tproxy-port: 7894
allow-lan: true
mode: rule
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: strict
# [CRITICAL] 已删除 global-client-fingerprint: chrome
# 该配置项已废弃，日志反复输出 deprecation warning
# 如需指定 TLS 指纹，在 proxy-provider 或单个节点配置中设置 client-fingerprint: chrome

keep-alive-interval: 30
keep-alive-idle: 600

# [ENHANCE] skip-auth-prefixes 加入 Tailscale CGNAT 段
# 允许 Tailscale 网络内的设备免认证访问 mihomo 的 LAN 代理
skip-auth-prefixes:
  - 127.0.0.1/8
  - 192.168.0.0/16
  - 10.0.0.0/8
  - 100.64.0.0/10

external-controller: 0.0.0.0:9090
secret: "your-secret-123456QWer!@"
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip

profile:
  store-selected: true
  store-fake-ip: true

# GEO 数据配置
# [CLEANUP] 删除了 geodata-loader: memconservative
# 原因: nikki 插件 (/etc/nikki/run/config.yaml) 会覆盖此值为 standard
# 如需修改，请在 nikki 的 Web UI (LuCI) 中设置
geodata-mode: true
geo-auto-update: true
geo-update-interval: 48
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"

# **=============================== 域名嗅探 ===============================**
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  # [CRITICAL] Tailscale CGNAT 地址不嗅探，防止 override-destination 干扰隧道流量
  skip-dst-address:
    - 100.64.0.0/10
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
    - "+.netflix.com"
    - "+.nflxvideo.net"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# **=============================== TUN 配置 ===============================**
tun:
  enable: true
  stack: mixed
  device: Mihomo
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 1500
  gso: true
  gso-max-size: 65536
  udp-timeout: 300
  # [CRITICAL] Tailscale CGNAT 地址段完全绕过 TUN 路由捕获
  # route-exclude-address 是旧版参数名，inet4-route-exclude-address 是新版
  # 两个都写，确保不同版本 mihomo 都能生效
  route-exclude-address:
    - 100.64.0.0/10
  inet4-route-exclude-address:
    - 100.64.0.0/10
  exclude-interface:
    - tailscale0
    - utun*
    - "Tailscale*"

# **=============================== DNS 配置 ===============================**
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  cache-algorithm: arc

  fake-ip-filter:
    - "*.lan"
    - "localhost.ptlogin2.qq.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.xboxlive.com"
    - "msftconnecttest.com"
    - "xbox.*.microsoft.com"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    # Tailscale
    - "*.ts.net"
    - "100.64.0.0/10"
    - "tailscale.com"
    - "+.local"
    - "+.home.arpa"
    # [ENHANCE] NTP/STUN 模式补全，防止时间同步和 WebRTC 打洞被 fake-ip 干扰
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "ntp.*.com"
    - "+.pool.ntp.org"
    - "time.nist.gov"
    - "stun.*.*"
    - "stun.*.*.*"
    - "+.stun.*.*"

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  nameserver-policy:
    "*.ts.net,tailscale.com": system
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

  # [CRITICAL] fallback DNS 通过代理出站，避免在国内直连 8.8.8.8/1.1.1.1 被墙导致超时风暴
  # [ENHANCE] 恢复 TLS 协议作为第三备份，提升协议多样性（DoH 被干扰时 DoT 可能存活）
  fallback:
    - "https://1.1.1.1/dns-query#🎯 节点选择"
    - "https://dns.google/dns-query#🎯 节点选择"
    - "tls://8.8.8.8:853#🎯 节点选择"

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.twitter.com"
      - "+.github.com"

