        冷门节点,
        全部节点,
        DIRECT,
      ],
  }
SelectPY:
  &SelectPY {
    type: select,
    proxies:
      [
        🎯 节点选择,
        故障转移,
        香港策略,
        狮城策略,
        日本策略,
        美国策略,
        台湾策略,
        欧盟策略,
        冷门节点,
        全部节点,
