model_provider = "acme"
model = "gpt-private"
model_reasoning_effort = "high"
model_context_window = 123456
model_auto_compact_token_limit = 111111

[shell_environment_policy]
inherit = "all"

[shell_environment_policy.set]
VIBECODING_VERSION = "9.9.0"
PRIVATE_FLAG = "preserve-me"

[model_providers.acme]
name = "acme"
base_url = "https://provider.example.invalid/v1"
env_key = "PRIVATE_PROVIDER_TOKEN"
wire_api = "responses"

[mcp_servers.internal]
command = "/opt/private/mcp"
args = ["--token-env", "PRIVATE_MCP_TOKEN"]

[projects."/private/project"]
trust_level = "trusted"

[plugins."custom@local"]
enabled = true

[desktop]
preventSleepWhileRunning = false
composerEnterBehavior = "enter"

[user_extension]
opaque = "must-survive"
nested = 42
