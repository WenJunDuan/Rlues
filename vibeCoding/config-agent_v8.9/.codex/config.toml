# VibeCoding Kernel v8.9 — Codex CLI 配置

model_provider = "custom"
disable_response_storage = true
network_access = true
experimental_use_rmcp_client = true
model = "gpt-5.4"                  
model_reasoning_effort = "xhigh"  
personality = "pragmatic"
web_search = "live"

# 危险，可开启 和下面的二选一，上面的代表绝对信任
# approval_policy = "never"  
# sandbox_mode = "danger-full-access" 
approval_policy = "never"  
sandbox_mode    = "workspace-write"  

[features]
fast_mode = true
plan_tool = true
view_image_tool = true
streamable_shell = true
rmcp_client = true
skills = true
parallel = true
unified_exec = true
shell_snapshot = true
multi_agent = true
steer = true

[agents.builder]
description = "实现功能代码。限定文件范围内编写, 每个子任务完成后 commit。"

[agents.reviewer]
description = "代码审查: 安全、正确性、测试风险。"

[agents.explorer]
description = "只读搜索分析: 搜索代码库、分析依赖、查找模式。"

[history]
persistence = "save-all"

[tui]
notifications = true
animations = true

[model_providers.custom]
name = "custom"
wire_api = "responses"
requires_openai_auth = true
base_url = ""

[mcp_servers]

[mcp_servers.mcp-deepwiki]
type = "stdio"
command = "npx"
args = ["-y", "mcp-deepwiki@latest"]

[mcp_servers."cunzhi"]
type = "stdio"
command = "寸止"

[mcp_servers.chrome-devtools]
type = "stdio"
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.augment-context-engine]
type = "stdio"
command = "npx"
args = ["ace-tool-rs", "--base-url", "https://acemcp.heroman.wtf/relay/", "--token", ""]
