# VibeCoding Kernel v9.1.5 — Codex CLI

model_provider = "custom"
model = "gpt-5.4"                      
model_reasoning_effort = "xhigh"
disable_response_storage = false
max_context = 1000000
context_compact_limit = 800000
suppress_unstable_features_warning = true

# 危险，可开启 和下面的二选一，上面的代表绝对信任
# approval_policy = "never"            # untrusted|on-request|never
# sandbox_mode = "danger-full-access"  # read-only|workspace-write|danger-full-access

approval_policy = "never"  
sandbox_mode    = "workspace-write"  

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false
web_search = "live"

[features]
multi_agent = true                     # stable; 多代理编排
collaboration_modes = true             # stable; 协作模式
shell_snapshot = true                  # beta; 加速重复命令
unified_exec = true                    # beta; PTY-backed 执行
shell_tool = true                      # stable; 默认 shell 工具
apply_patch_freeform = true            # experimental; 自由 patch
undo = true                            # 回滚 Codex 改动;

[history]
persistence = "save-all"

[tui]
notifications = true
animations = true

[profiles.dev]
model = "gpt-5.4"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.ci]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.review]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
approval_policy = "untrusted"
sandbox_mode = "read-only"

[agents]
max_threads = 6
max_depth = 2
job_max_runtime_seconds = 1800

[agents.builder]
description = "实现功能代码。先测试后实现, 每个子任务完成后 commit。"
config_file = "./agents/builder.toml"

[agents.reviewer]
description = "代码审查: 安全、正确性、测试风险。"
config_file = "./agents/reviewer.toml"

[agents.explorer]
description = "只读搜索分析。"
config_file = "./agents/explorer.toml"

[model_providers.custom]
name = "openai"
wire_api = "responses"
requires_openai_auth = true
base_url = ""

[mcp_servers]

[mcp_servers.mcp-deepwiki]
type = "stdio"
command = "npx"
args = ["-y", "mcp-deepwiki@latest"]

[mcp_servers."cunzhi"]
type = "stdio"
command = "寸止"

[mcp_servers.chrome-devtools]
type = "stdio"
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.augment-context-engine]
type = "stdio"
command = "npx"
args = ["ace-tool-rs", "--base-url", "", "--token", ""]
