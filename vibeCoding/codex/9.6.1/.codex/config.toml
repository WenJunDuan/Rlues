# VibeCoding Athena v9.6.1 · Codex Configuration (hotfix-2)
# 位置: ~/.codex/config.toml

project_root_markers = [".git", ".hg", ".sl"]
project_doc_max_bytes = 65536

model_provider = "openai"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000
web_search = "live"
suppress_unstable_features_warning = true

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[features]
codex_hooks = true
multi_agent = true
shell_tool = true
shell_snapshot = true
unified_exec = true
apply_patch_freeform = true
undo = true
memories = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true

# ====== Hooks 配置 ======
# 全部迁移到 ~/.codex/hooks.json
# config.toml 不再含 [[hooks.*]] 段.

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[[skills.config]]
name = "pace"
enabled = true

[[skills.config]]
name = "compound"
enabled = true

[[skills.config]]
name = "context7"
enabled = true

[[skills.config]]
name = "superpowers"
enabled = true

[model_providers.OpenAI]
name = "OpenAI"
base_url = ""
wire_api = "responses"
requires_openai_auth = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
VIBECODING_VERSION = "9.6.1-codex-hotfix2"

# augment-context-engine: 语义代码检索
[mcp_servers.augment-context-engine]
command = "npx"
args = [ "ace-tool-rs", "--base-url", "https://acemcp.heroman.wtf/relay/", "--token", "<YOUR_ACE_TOKEN>" ]

[mcp_servers.augment-context-engine.tools.search_context]
approval_mode = "approve"
