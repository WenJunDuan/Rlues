# VibeCoding Kernel v9.4.3-cx
model_provider = "OpenAI"
model = "gpt-5.4"
review_model = "gpt-5.4"
model_reasoning_effort = "xhigh"
disable_response_storage = true
network_access = "enabled"
windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true
shell_tool = true
shell_snapshot = true
codex_hooks = true
collaboration_modes = true
unified_exec = true
apply_patch_freeform = true
undo = true

[tui]
notifications = true
animations = true

[agents]
max_threads = 5
max_depth = 1

[agents.builder]
description = "Implementation agent. TDD: write test → implement → verify."

[agents.reviewer]
description = "Independent quality reviewer. Score 4 dimensions, output VERDICT."
config_file = "./agents/reviewer.toml"
nickname_candidates = ["Athena", "Ada"]

[model_providers.OpenAI]
name = "OpenAI"
base_url = ""
wire_api = "responses"
requires_openai_auth = true

[mcp_servers.augment-context-engine]
type = "stdio"
command = "npx"
args = ["ace-tool-rs", "--base-url", "https://acemcp.heroman.wtf/relay/", "--token", ""]
