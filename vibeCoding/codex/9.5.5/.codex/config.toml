# PermissionRequest: 仅 systemMessage (Codex PermissionRequest 受限, 不能 ask/allow/deny)
[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/hooks/permission-request.py"'
timeout = 5

# Stop: delivery-gate 质量门
[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "$HOME/.codex/hooks/delivery-gate.py"'
timeout = 60
statusMessage = "Running delivery-gate"

# Subagents (用 instructions 字段引用 AGENTS.md 文件, 不内嵌字符串)

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

# Skills (v9.5: per-skill 启用控制, Codex 3/2026 新增)

[[skills.config]]
name = "pace"
enabled = true

[[skills.config]]
name = "compound"
enabled = true

[[skills.config]]
name = "context7"
enabled = true

[[skills.config]]
name = "superpowers"
enabled = true

# Environment
[tui.model_availability_nux]
"gpt-5.5" = 4

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
VIBECODING_VERSION = "9.5.5-codex"

# 代理占位 (按需取消注释)
# HTTPS_PROXY = "http://127.0.0.1:7890"
# HTTP_PROXY = "http://127.0.0.1:7890"
# ALL_PROXY = "socks5://127.0.0.1:7891"
# NO_PROXY = "localhost,127.0.0.1,.local"

[model_providers.OpenAI]
name = "OpenAI"
base_url = ""
wire_api = "responses"
requires_openai_auth = true

[mcp_servers.augment-context-engine]
command = "npx"
args = ["ace-tool-rs", "--base-url", "https://acemcp.heroman.wtf/relay/", "--token", ""]

[mcp_servers.augment-context-engine.tools.search_context]
approval_mode = "approve"

# Project Discovery
project_root_markers = [".git", ".hg", ".sl"]

# AGENTS.md 大小上限 (默认 32KiB, 扩到 64KiB 容纳铁律扩展)
project_doc_max_bytes = 65536