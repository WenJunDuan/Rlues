# VibeCoding Athena v9.9.0 · Codex Configuration  (v9.9.0)
# 位置: ~/.codex/config.toml

project_root_markers = [".git", ".hg", ".sl"]
project_doc_max_bytes = 65536

model_provider = "openai"
# 7/23 遗留 Codex API 模型永久关停; ChatGPT 登录态官方建议不 pin, 此处 pin 当前默认取确定性 — 勿回退旧 ID
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000
web_search = "live"

suppress_unstable_features_warning = true

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[features]
# hooks / multi_agent 已默认开 (hooks 5/14 GA, multi_agent 0.142+), 保留显式声明兼容旧版
hooks = true
multi_agent = true
shell_tool = true
shell_snapshot = true
unified_exec = true
memories = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[[skills.config]]
path = "<USER_HOME>/.codex/skills/athena-dev/SKILL.md"
enabled = true

