# VibeCoding Athena v9.6 · Codex Configuration
# 位置: ~/.codex/config.toml

project_root_markers = [".git", ".hg", ".sl"]
project_doc_max_bytes = 65536

model_provider = "openai"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000
web_search = "live"
suppress_unstable_features_warning = true

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false

[features]
hooks = true
multi_agent = true
shell_tool = true
shell_snapshot = true
unified_exec = true
apply_patch_freeform = true
undo = true
memories = true

[memories]
generate_memories = true
use_memories = true
disable_on_external_context = true

[[hooks.SessionStart]]
matcher = "^(startup|resume|clear)$"
[[hooks.SessionStart.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/session-start.py\""
timeout = 10
statusMessage = "Loading Athena context"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/user-prompt-submit.py\""
timeout = 5
statusMessage = "Athena pre-check"

[[hooks.PreToolUse]]
matcher = "^Bash$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/pre-bash-guard.py\""
timeout = 10
statusMessage = "Checking Bash command"

[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/index-updater.py\""
timeout = 10

[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/subagent-retry.py\""
timeout = 10

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/delivery-gate.py\""
timeout = 60
statusMessage = "Athena delivery-gate"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[[skills.config]]
name = "pace"
enabled = true

[[skills.config]]
name = "compound"
enabled = true

[[skills.config]]
name = "context7"
enabled = true

[[skills.config]]
name = "superpowers"
enabled = true

[model_providers.OpenAI]
name = "OpenAI"
base_url = ""
wire_api = "responses"
requires_openai_auth = true

